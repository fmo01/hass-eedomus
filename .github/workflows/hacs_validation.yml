name: HACS Validate
on:
  push:
    branches: [ main, unstable ]
  pull_request:
    branches: [ main, unstable ]
  workflow_dispatch: # Permet le déclenchement manuel


jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v5.0.0"
      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "integration"
